{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Create Scenario – Cthulhu RPG" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">
        <i class="fas fa-plus me-2"></i>{% trans "Create New Scenario" %}
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">{% trans "Scenario Name" %} <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
              value="{{ form_data.name|default:'' }}"
              placeholder="{% trans "e.g. The Haunting, Edge of Darkness" %}" required autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label">{% trans "Place / Location" %}</label>
            <input type="text" name="place" class="form-control"
              value="{{ form_data.place|default:'' }}"
              placeholder="{% trans "e.g. Arkham, Massachusetts – 1920s" %}">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">{% trans "Status" %}</label>
              <select name="status" class="form-select">
                {% for val, label in status_choices %}
                <option value="{{ val }}"
                  {% if form_data.status == val %}selected{% elif val == 'PLANNING' and not form_data %}selected{% endif %}>
                  {{ label }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">{% trans "Visibility" %}</label>
              <select name="visibility" class="form-select">
                {% for val, label in visibility_choices %}
                <option value="{{ val }}"
                  {% if form_data.visibility == val %}selected{% elif val == 'PRIVATE' and not form_data %}selected{% endif %}>
                  {{ label }}
                </option>
                {% endfor %}
              </select>
              <div class="form-text">{% trans "Public scenarios appear in the global scenarios list." %}</div>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">{% trans "Description" %}</label>
            <textarea name="description" class="form-control" rows="4"
              placeholder="{% trans "Brief synopsis or GM notes about the scenario…" %}">{{ form_data.description|default:'' }}</textarea>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <a href="{% url 'scenarios:list' %}" class="btn btn-secondary">
              <i class="fas fa-times me-1"></i>{% trans "Cancel" %}
            </a>
            <button type="submit" class="btn btn-warning">
              <i class="fas fa-plus me-1"></i>{% trans "Create Scenario" %}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
