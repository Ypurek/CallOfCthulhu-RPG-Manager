{% load i18n %}
<div class="d-flex justify-content-between align-items-center mb-2 gap-2 flex-wrap">
  <small class="text-muted" data-player-sheet-summary>
    <i class="fas fa-user me-1"></i><span data-player-sheet-name>{{ character.name }}</span>
    <span data-player-sheet-occupation>{% if character.occupation %}&bull; {{ character.occupation }}{% endif %}</span>
  </small>
  <a href="{% url 'characters:edit_wizard' character.id %}?next={% url 'scenarios:detail' scenario.id %}" class="btn btn-sm btn-outline-warning">
    <i class="fas fa-edit me-1"></i>{% trans "Edit" %}
  </a>
</div>
{% include 'characters/_character_sheet.html' with sheet=sheet sheet_id=sheet_id show_notes=False notes_editable=False show_actions=False status_adjustable=False %}
