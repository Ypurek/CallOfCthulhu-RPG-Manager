{% extends 'base.html' %}

{% block title %}Edit: {{ scenario.name }} – Cthulhu RPG{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">
        <i class="fas fa-edit me-2"></i>Edit Scenario
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Scenario Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ scenario.name }}" required autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label">Place / Location</label>
            <input type="text" name="place" class="form-control" value="{{ scenario.place }}">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <select name="status" class="form-select">
                {% for val, label in status_choices %}
                <option value="{{ val }}" {% if scenario.status == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Visibility</label>
              <select name="visibility" class="form-select">
                {% for val, label in visibility_choices %}
                <option value="{{ val }}" {% if scenario.visibility == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="5">{{ scenario.description }}</textarea>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <a href="{% url 'scenarios:manage' scenario.id %}" class="btn btn-secondary">
              <i class="fas fa-times me-1"></i>Cancel
            </a>
            <button type="submit" class="btn btn-warning">
              <i class="fas fa-save me-1"></i>Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
