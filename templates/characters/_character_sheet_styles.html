<style>
    .character-sheet {
        max-width: 520px;
        width: 100%;
        margin: 0 auto;
        font-family: 'Cinzel', 'Times New Roman', serif;
        background: transparent;
        border-radius: 0;
        box-shadow: none;
        padding: 12px;
        color: var(--cream);
    }

    .character-name {
        font-size: 1.8rem;
        font-weight: bold;
        text-align: center;
        color: var(--gold);
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 5px;
        border-bottom: 1px solid transparent;
    }

    .character-name:hover {
        color: #fff;
        transform: scale(1.02);
        border-bottom-color: var(--gold);
    }

    .character-meta {
        text-align: center;
        font-size: 0.9rem;
        color: rgba(245, 245, 220, 0.8);
        margin-bottom: 20px;
    }

    .character-effects {
        text-align: center;
        margin-bottom: 10px;
        min-height: 22px;
    }

    .effect-badge {
        display: inline-block;
        margin: 0 2px 4px 2px;
        padding: 0.24rem 0.48rem;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.2px;
        text-shadow: none;
        cursor: pointer;
    }

    .effect-badge:focus {
        outline: 2px solid rgba(212, 175, 55, 0.9);
        outline-offset: 1px;
    }

    .effect-badge.bg-warning {
        background: #7a5a00 !important;
        color: #fff9e0 !important;
    }

    .effect-badge.bg-danger {
        background: #8f1f2d !important;
        color: #fff !important;
    }

    .effect-badge.bg-dark {
        background: #4a5568 !important;
        color: #f5f8ff !important;
    }

    .effect-badge.bg-info {
        background: #0e5a7c !important;
        color: #eef9ff !important;
    }

    .effect-badge.bg-secondary {
        background: #4f5961 !important;
        color: #fff !important;
    }

    .effect-description-popover {
        --bs-popover-bg: rgba(244, 238, 223, 0.98);
        --bs-popover-border-color: rgba(212, 175, 55, 0.55);
        --bs-popover-header-bg: transparent;
        --bs-popover-header-color: #2f2618;
        --bs-popover-body-color: #2b2418;
        --bs-popover-arrow-border: rgba(212, 175, 55, 0.55);
        --bs-popover-box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
        max-width: 280px;
        border-radius: 12px;
        backdrop-filter: blur(2px);
    }

    .effect-description-popover .popover-body {
        background: linear-gradient(180deg, rgba(248, 244, 234, 0.99), rgba(236, 228, 207, 0.99));
        font-size: 0.92rem;
        line-height: 1.45;
        padding: 0.75rem 0.9rem;
        color: #2b2418;
    }

    .description-popup {
        display: none;
        background: rgba(44, 44, 44, 0.95);
        border: 1px solid var(--gold);
        border-radius: 8px;
        padding: 15px;
        margin: 10px 0;
        font-style: italic;
        line-height: 1.4;
    }

    .stat-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
    }

    .stat-bar-container {
        position: relative;
        margin-bottom: 8px;
    }

    .stat-bar-adjustable {
        cursor: ew-resize;
    }

    .stat-label {
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-weight: bold;
        font-size: 0.72rem;
        z-index: 3;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
        color: white;
    }

    .stat-bar {
        height: 18px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 9px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        position: relative;
        overflow: hidden;
    }

    .stat-fill {
        height: 100%;
        border-radius: 9px;
        transition: width 0.4s ease;
        background: linear-gradient(90deg, var(--fill-color), var(--fill-light));
    }

    .hp-fill { --fill-color: #dc3545; --fill-light: #ff6b6b; }
    .san-fill { --fill-color: #28a745; --fill-light: #66bb6a; }

    .san-madness-threshold {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: rgba(255, 80, 80, 0.85);
        box-shadow: 0 0 4px rgba(255, 60, 60, 0.7);
        pointer-events: none;
        z-index: 2;
    }
    .mp-fill { --fill-color: #007bff; --fill-light: #42a5f5; }
    .luck-fill { --fill-color: #ffc107; --fill-light: #ffeb3b; }

    .stat-text {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-weight: 900;
        font-size: 0.85rem;
        z-index: 2;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.95), 0 0 6px rgba(0, 0, 0, 0.75);
        color: #fffdf2;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 1px 6px;
        border-radius: 999px;
        letter-spacing: 0.5px;
    }

    .characteristics {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        margin-bottom: 14px;
    }

    .characteristic {
        background: linear-gradient(145deg, rgba(212, 175, 55, 0.35), rgba(212, 175, 55, 0.45));
        border: 2px solid rgba(212, 175, 55, 0.8);
        border-radius: 8px;
        padding: 6px 5px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.8rem;
        box-shadow: 0 2px 6px rgba(212, 175, 55, 0.3);
    }

    .characteristic:hover {
        background: linear-gradient(145deg, rgba(212, 175, 55, 0.5), rgba(212, 175, 55, 0.6));
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.5);
        border-color: rgba(212, 175, 55, 1);
    }

    .characteristic .stat-name {
        font-weight: bold;
        color: #fff;
        font-size: 0.75rem;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }

    .characteristic .stat-value {
        font-size: 1.15rem;
        font-weight: 900;
        color: #ffff00;
        line-height: 1.2;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9), 0 0 8px rgba(212, 175, 55, 0.6);
    }

    .skills-container {
        margin-bottom: 12px;
    }

    .section-header {
        background: linear-gradient(90deg, rgba(26, 60, 46, 0.78), rgba(44, 44, 44, 0.55));
        border: 1px solid rgba(150, 185, 165, 0.35);
        border-radius: 6px;
        padding: 8px 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        font-size: 0.9rem;
        line-height: 1.2;
        transition: all 0.3s ease;
        margin-bottom: 4px;
    }

    .section-header:hover {
        background: linear-gradient(90deg, rgba(36, 78, 61, 0.86), rgba(58, 58, 58, 0.62));
        border-color: rgba(189, 219, 201, 0.45);
        transform: translateY(-1px);
    }

    .section-header.combat {
        background: linear-gradient(90deg, rgba(35, 68, 56, 0.8), rgba(52, 64, 58, 0.58));
        border-color: rgba(140, 172, 155, 0.42);
    }

    .section-header.combat:hover {
        background: linear-gradient(90deg, rgba(46, 83, 69, 0.88), rgba(64, 78, 70, 0.66));
    }

    .section-header i {
        font-size: 0.85rem;
    }

    .section-content {
        display: none;
        padding: 0;
    }

    .section-content.show {
        display: block;
        animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .skills-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        margin: 8px 0;
    }

    .skill-item {
        background: rgba(44, 44, 44, 0.4);
        border-left: 3px solid var(--gold);
        border-radius: 4px;
        padding: 6px 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.85rem;
    }

    .skill-item:hover {
        background: rgba(44, 44, 44, 0.7);
        transform: translateX(3px);
        border-left-width: 4px;
    }

    .skill-item.combat {
        border-left-color: #dc3545;
    }

    .skill-item.combat:hover {
        border-left-color: #ff6b6b;
    }

    .skill-name {
        font-size: 0.8rem;
        color: rgba(245, 245, 220, 0.9);
    }

    .skill-value {
        font-weight: bold;
        color: var(--gold);
        float: right;
    }

    .compact-section {
        background: rgba(44, 44, 44, 0.3);
        border-radius: 8px;
        padding: 10px;
        margin: 10px 0;
    }

    .compact-header {
        font-weight: bold;
        color: var(--gold);
        margin-bottom: 8px;
        font-size: 0.9rem;
    }

    .items-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
    }

    .item-badge {
        background: rgba(212, 175, 55, 0.2);
        border: 1px solid rgba(212, 175, 55, 0.4);
        border-radius: 12px;
        padding: 3px 8px;
        font-size: 0.75rem;
        color: var(--gold);
    }

    .item-badge.cash-badge {
        background: rgba(13, 110, 253, 0.24);
        border-color: rgba(13, 110, 253, 0.62);
        color: #d9ebff;
        font-weight: 700;
    }

    .weapon-item {
        background: rgba(139, 28, 28, 0.2);
        border: 1px solid rgba(139, 28, 28, 0.4);
        border-radius: 6px;
        padding: 6px;
        margin: 2px 0;
        font-size: 0.8rem;
    }

    .add-skill-btn {
        background: rgba(212, 175, 55, 0.1);
        border: 1px dashed rgba(212, 175, 55, 0.5);
        border-radius: 4px;
        padding: 6px;
        text-align: center;
        cursor: pointer;
        color: var(--gold);
        font-size: 0.8rem;
        transition: all 0.3s ease;
        margin-top: 8px;
    }

    .add-skill-btn:hover {
        background: rgba(212, 175, 55, 0.2);
        border-color: var(--gold);
    }

    .toggle-default-btn {
        width: 100%;
        margin-top: 8px;
        background: rgba(245, 245, 220, 0.08);
        border: 1px solid rgba(245, 245, 220, 0.3);
        color: rgba(245, 245, 220, 0.9);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 0.8rem;
    }

    .default-skills {
        display: none;
    }

    .default-skills.show {
        display: block;
        margin-top: 8px;
    }

    .notes-textarea {
        width: 100%;
        min-height: 120px;
        border-radius: 8px;
        border: 1px solid rgba(212, 175, 55, 0.35);
        background: rgba(10, 10, 10, 0.35);
        color: var(--cream);
        padding: 8px;
        resize: vertical;
    }

    .notes-textarea:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }

    .action-buttons {
        display: flex;
        gap: 8px;
        margin-top: 20px;
        justify-content: center;
    }

    .btn-compact {
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 0.85rem;
        border: 1px solid var(--gold);
        background: rgba(212, 175, 55, 0.1);
        color: var(--gold);
        transition: all 0.3s ease;
    }

    .btn-compact:hover {
        background: var(--gold);
        color: var(--shadow);
        transform: translateY(-2px);
    }

    .modal {
        color: #333;
    }

    @media (max-width: 768px) {
        .character-sheet {
            max-width: 100%;
            margin: 0;
            padding: 8px;
        }

        .skills-grid {
            grid-template-columns: 1fr 1fr;
        }

        .characteristics {
            grid-template-columns: repeat(2, 1fr);
        }
    }
</style>
