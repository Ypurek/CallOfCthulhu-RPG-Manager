{% extends 'base.html' %}

{% block title %}Character Templates - Cthulhu RPG Manager{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1><i class="fas fa-file-alt"></i> Character Templates</h1>
        <p class="text-muted">Pre-made character templates to quickly start playing</p>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="text-center py-5">
                    <i class="fas fa-hammer fa-3x text-warning mb-3"></i>
                    <h3>Under Construction</h3>
                    <p class="text-muted">Character templates coming soon!</p>
                    <a href="{% url 'characters:list' %}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Characters
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
